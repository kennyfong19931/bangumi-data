name: 🇭🇰 hokan
on:
  schedule:
    - cron: '20 6 * * 5'
      timezone: Asia/Hong_Kong
  workflow_dispatch:

jobs:
  hokan:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: current-time
        uses: srfrnk/current-time@5a4163ad035ccd9a407ec9e519c3b6ba1b633d1e
        with:
          format: YYYYMMDD-HHmmss

      - name: Set branch name
        id: branch-name
        run: echo "result=$BRANCH_NAME" >> $GITHUB_OUTPUT
        env:
          BRANCH_NAME: 'hokan-hk-${{ steps.current-time.outputs.formattedTime }}'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install OpenVPN
        run: |
          sudo apt update
          sudo apt install -y openvpn openvpn-systemd-resolved

      - name: Checkout bangumi data
        uses: actions/checkout@v6
        with:
          ref: master
          path: ./bangumi-data

      - name: Checkout helper
        uses: actions/checkout@v6
        with:
          repository: kennyfong19931/helper
          ref: local
          path: ./helper
          
      - name: Checkout ovpn config
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          path: ./vpn

      - name: Create a new branch
        working-directory: ./bangumi-data
        run: git checkout -b ${{ steps.branch-name.outputs.result }}

      - name: Connect to VPN
        uses: "kota65535/github-openvpn-connect-action@v3"
        with:
          config_file: ./vpn/.github/vpn/hk211.nordvpn.com.udp.ovpn
          username: ${{ secrets.NORD_USERNAME }}
          password: ${{ secrets.NORD_PASSWORD }}
          tls_auth_key: ${{ secrets.NORD_TLS_AUTH }}

      - name: Run bdh to hokan
        continue-on-error: true
        working-directory: ./helper
        run: |
          npm install
          echo ">>> hokan netflix"
          npx bdh hokan netflix
          echo ">>> hokan crunchyroll"
          npx bdh hokan crunchyroll
          echo ">>> hokan muse_hk"
          npx bdh hokan muse_hk
          echo ">>> hokan ani_one"
          npx bdh hokan ani_one
          echo ">>> hokan ani_one_asia"
          npx bdh hokan ani_one_asia
          echo ">>> hokan tropics"
          npx bdh hokan tropics
          echo ">>> hokan viu"
          npx bdh hokan viu
          echo ">>> hokan gamer_hk"
          npx bdh hokan gamer_hk
          echo ">>> hokan mytv"
          npx bdh hokan mytv
          echo ">>> hokan bilibili_hk_mo_tw"
          npx bdh hokan bilibili_hk_mo_tw
          echo ">>> hokan bilibili_hk_mo"
          npx bdh hokan bilibili_hk_mo

      - name: Edit .gitignore
        working-directory: ./bangumi-data
        run: sed -i '/^data\/items\/0000$/d' .gitignore

      - name: Create patch for helper
        working-directory: ./helper
        run: git diff > ../bangumi-data/helper.patch

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: ./bangumi-data
          commit_message: 🇭🇰 hokan
          branch: ${{ steps.branch-name.outputs.result }}
