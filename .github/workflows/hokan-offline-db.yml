name: hokan offline-db
on:
  schedule:
    - cron: '0 10 * * 5'
  workflow_dispatch:

jobs:
  hokan:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: current-time
        uses: srfrnk/current-time@5a4163ad035ccd9a407ec9e519c3b6ba1b633d1e
        with:
          format: YYYYMMDD-HHmmss

      - name: Set branch name
        id: branch-name
        run: echo "result=$BRANCH_NAME" >> $GITHUB_OUTPUT
        env:
          BRANCH_NAME: 'hokan-offline-db-${{ steps.current-time.outputs.formattedTime }}'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Checkout bangumi data
        uses: actions/checkout@v6
        with:
          ref: master
          path: ./bangumi-data

      - name: Checkout helper
        uses: actions/checkout@v6
        with:
          repository: kennyfong19931/helper
          ref: local
          path: ./helper

      - name: Create a new branch
        working-directory: ./bangumi-data
        run: git checkout -b ${{ steps.branch-name.outputs.result }}

      - name: Run bdh to hokan
        working-directory: ./helper
        run: |
          npm install
          npx bdh hokan mal
          npx bdh hokan aniList
          npx bdh hokan anidb
          npx bdh hokan tmdb

      - name: Remove .gitignore
        working-directory: ./bangumi-data
        run: rm .gitignore

      - name: Commit changes
        id: commit-changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: ./bangumi-data
          commit_message: hokan offline-db
          branch: ${{ steps.branch-name.outputs.result }}
