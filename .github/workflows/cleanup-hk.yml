name: 🇭🇰 cleanup

on:
  schedule:
    - cron: '30 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: current-time
        uses: josStorer/get-current-time@v2
        with:
          format: YYYYMMDD-HHmmss

      - name: Set branch name
        id: branch-name
        run: echo "result=$BRANCH_NAME" >> $GITHUB_OUTPUT
        env:
          BRANCH_NAME: 'cleanup-hk-${{ steps.current-time.outputs.formattedTime }}'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install OpenVPN
        run: |
          sudo apt update
          sudo apt install -y openvpn openvpn-systemd-resolved
  
      - name: Checkout bangumi data
        uses: actions/checkout@v6
        with:
          ref: master
          path: ./bangumi-data

      - name: Checkout helper
        uses: actions/checkout@v6
        with:
          repository: kennyfong19931/helper
          ref: local
          path: ./helper
          
      - name: Checkout ovpn config
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          path: ./vpn

      - name: Create a new branch
        working-directory: ./bangumi-data
        run: git checkout -b ${{ steps.branch-name.outputs.result }}

      - name: Connect to VPN
        uses: "kota65535/github-openvpn-connect-action@v3"
        with:
          config_file: ./vpn/.github/vpn/hk211.nordvpn.com.udp.ovpn
          username: ${{ secrets.NORD_USERNAME }}
          password: ${{ secrets.NORD_PASSWORD }}
          tls_auth_key: ${{ secrets.NORD_TLS_AUTH }}

      - name: Run bdh to cleanup
        continue-on-error: true
        working-directory: ./helper
        run: |
          npm install
          echo ">>> cleanup netflix"
          npx bdh cleanup netflix
          echo ">>> cleanup crunchyroll"
          npx bdh cleanup crunchyroll
          echo ">>> cleanup muse_hk"
          npx bdh cleanup muse_hk
          echo ">>> cleanup ani_one"
          npx bdh cleanup ani_one
          echo ">>> cleanup ani_one_asia"
          npx bdh cleanup ani_one_asia
          echo ">>> cleanup tropics"
          npx bdh cleanup tropics
          echo ">>> cleanup viu"
          npx bdh cleanup viu
          echo ">>> cleanup gamer_hk"
          npx bdh cleanup gamer_hk
          echo ">>> cleanup mytv"
          npx bdh cleanup mytv
          echo ">>> cleanup bilibili_hk_mo_tw"
          npx bdh cleanup bilibili_hk_mo_tw
          echo ">>> cleanup bilibili_hk_mo"
          npx bdh cleanup bilibili_hk_mo

      - name: Commit changes
        id: commit-changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: ./bangumi-data
          commit_message: 🇭🇰 cleanup
          branch: ${{ steps.branch-name.outputs.result }}
