name: 🇯🇵 cleanup

on:
  schedule:
    - cron: '30 1 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Get current time
        id: current-time
        uses: josStorer/get-current-time@v2
        with:
          format: YYYYMMDD-HHmmss

      - name: Set branch name
        id: branch-name
        run: echo "result=$BRANCH_NAME" >> $GITHUB_OUTPUT
        env:
          BRANCH_NAME: 'cleanup-jp-${{ steps.current-time.outputs.formattedTime }}'

      - name: Puppeteer - Disable AppArmor
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Install OpenVPN
        run: |
          sudo apt update
          sudo apt install -y openvpn openvpn-systemd-resolved
  
      - name: Checkout bangumi data
        uses: actions/checkout@v6
        with:
          ref: master
          path: ./bangumi-data

      - name: Checkout helper
        uses: actions/checkout@v6
        with:
          repository: kennyfong19931/helper
          ref: local
          path: ./helper
          
      - name: Checkout ovpn config
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          path: ./vpn

      - name: Create a new branch
        working-directory: ./bangumi-data
        run: git checkout -b ${{ steps.branch-name.outputs.result }}

      - name: Connect to VPN
        uses: "kota65535/github-openvpn-connect-action@v3"
        with:
          config_file: ./vpn/.github/vpn/jp806.nordvpn.com.udp.ovpn
          username: ${{ secrets.NORD_USERNAME }}
          password: ${{ secrets.NORD_PASSWORD }}
          tls_auth_key: ${{ secrets.NORD_TLS_AUTH }}

      - name: Run bdh to cleanup
        continue-on-error: true
        working-directory: ./helper
        run: |
          npm install
          echo ">>> cleanup nicovideo"
          npx bdh cleanup nicovideo
          echo ">>> cleanup unext"
          npx bdh cleanup unext
          echo ">>> cleanup danime"
          npx bdh cleanup danime
          echo ">>> cleanup prime"
          npx bdh cleanup prime
          echo ">>> cleanup abema"
          npx bdh cleanup abema

      - name: Commit changes
        id: commit-changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: ./bangumi-data
          commit_message: 🇯🇵 cleanup
          branch: ${{ steps.branch-name.outputs.result }}
